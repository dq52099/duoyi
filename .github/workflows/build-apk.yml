name: build-apk

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: true

      - name: Restore release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.DUOYI_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app/keys
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keys/duoyi-release.jks
          ls -lh android/app/keys
          cat > android/key.properties <<EOF
          storeFile=keys/duoyi-release.jks
          storePassword=${{ secrets.DUOYI_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.DUOYI_KEY_ALIAS }}
          keyPassword=${{ secrets.DUOYI_KEY_PASSWORD }}
          EOF

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Build App Bundle (release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: flutter build appbundle --release

      - name: Stage artifacts
        run: |
          mkdir -p artifacts
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF##refs/tags/}"
            cp build/app/outputs/flutter-apk/app-release.apk artifacts/duoyi-${TAG}.apk
            if [ -f build/app/outputs/bundle/release/app-release.aab ]; then
              cp build/app/outputs/bundle/release/app-release.aab artifacts/duoyi-${TAG}.aab
            fi
          else
            cp build/app/outputs/flutter-apk/app-release.apk artifacts/duoyi-${GITHUB_SHA::7}.apk
          fi
          ls -lh artifacts

      - name: Print signing fingerprint
        run: |
          echo "Verifying APK signing identity (sha256):"
          $JAVA_HOME/bin/keytool -printcert -jarfile artifacts/duoyi-*.apk | grep -E 'SHA256|Owner|Issuer' || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: duoyi-apk
          path: artifacts/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

      - name: Cleanup keystore
        if: always()
        run: rm -f android/app/keys/duoyi-release.jks android/key.properties
