name: build-apk

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p artifacts
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF##refs/tags/}"
            cp build/app/outputs/flutter-apk/app-release.apk artifacts/fingertip_time-${TAG}.apk
          else
            cp build/app/outputs/flutter-apk/app-release.apk artifacts/fingertip_time-${GITHUB_SHA::7}.apk
          fi
          ls -lh artifacts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fingertip_time-apk
          path: artifacts/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          generate_release_notes: true
