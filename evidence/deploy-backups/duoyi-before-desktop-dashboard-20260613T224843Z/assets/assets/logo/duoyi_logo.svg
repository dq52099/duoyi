<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFC79A"/>
      <stop offset="1" stop-color="#FF6B6B"/>
    </linearGradient>
    <linearGradient id="sandTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF8A8A"/>
      <stop offset="1" stop-color="#FF6B6B"/>
    </linearGradient>
    <linearGradient id="sandBot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFC79A"/>
      <stop offset="1" stop-color="#FFA76B"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A2A24"/>
      <stop offset="1" stop-color="#5A3F36"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="64" y="64" width="896" height="896" rx="200" ry="200" fill="url(#bg)"/>
  <!-- Soft top-left highlight -->
  <ellipse cx="320" cy="280" rx="380" ry="280" fill="url(#glow)"/>

  <!-- Hourglass frame (single solid bowtie outline)
       Top trapezoid:    280,260 -> 744,260 -> 552,512 -> 472,512
       Bottom trapezoid: 472,512 -> 552,512 -> 744,764 -> 280,764
       Plus top and bottom plates -->
  <g>
    <!-- Top plate -->
    <rect x="240" y="232" width="544" height="42" rx="14" ry="14" fill="url(#frame)"/>
    <!-- Bottom plate -->
    <rect x="240" y="750" width="544" height="42" rx="14" ry="14" fill="url(#frame)"/>

    <!-- Glass body -->
    <path d="M 280 274
             L 744 274
             L 552 504
             L 552 520
             L 744 750
             L 280 750
             L 472 520
             L 472 504
             Z"
          fill="#FFFFFF" fill-opacity="0.18"
          stroke="url(#frame)" stroke-width="22" stroke-linejoin="round"/>
  </g>

  <!-- Sand: top falling down -->
  <path d="M 320 296
           L 704 296
           L 552 480
           L 472 480 Z"
        fill="url(#sandTop)"/>

  <!-- Sand stream through neck -->
  <rect x="503" y="490" width="18" height="60" fill="url(#sandTop)" rx="3"/>

  <!-- Sand: bottom pile -->
  <path d="M 472 540
           L 552 540
           L 720 728
           L 304 728 Z"
        fill="url(#sandBot)"/>
  <ellipse cx="512" cy="728" rx="220" ry="22" fill="url(#sandBot)"/>

  <!-- Floating grain dots in upper chamber -->
  <g fill="#FFFFFF" fill-opacity="0.6">
    <circle cx="430" cy="360" r="6"/>
    <circle cx="600" cy="332" r="5"/>
    <circle cx="540" cy="402" r="4"/>
    <circle cx="488" cy="430" r="5"/>
    <circle cx="568" cy="450" r="4"/>
  </g>

  <!-- Sparkle accents -->
  <g fill="#FFFFFF" fill-opacity="0.9">
    <path d="M 800 380 l 14 0 l 0 -14 l 6 0 l 0 14 l 14 0 l 0 6 l -14 0 l 0 14 l -6 0 l 0 -14 l -14 0 z"/>
    <path d="M 196 660 l 10 0 l 0 -10 l 4 0 l 0 10 l 10 0 l 0 4 l -10 0 l 0 10 l -4 0 l 0 -10 l -10 0 z"/>
  </g>
</svg>
